<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#161b22;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1117;stop-opacity:1" />
    </linearGradient>

    <!-- Portal glow gradient -->
    <radialGradient id="portalGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.6" />
      <stop offset="40%" style="stop-color:#5b21b6;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#5b21b6;stop-opacity:0" />
    </radialGradient>

    <!-- Google colors -->
    <linearGradient id="googleBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4285F4" />
      <stop offset="100%" style="stop-color:#3367D6" />
    </linearGradient>
    <linearGradient id="googleRed" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EA4335" />
      <stop offset="100%" style="stop-color:#C5221F" />
    </linearGradient>
    <linearGradient id="googleYellow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FBBC05" />
      <stop offset="100%" style="stop-color:#F9AB00" />
    </linearGradient>
    <linearGradient id="googleGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#34A853" />
      <stop offset="100%" style="stop-color:#188038" />
    </linearGradient>

    <!-- MCP Protocol glow -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="iconShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.4"/>
    </filter>

    <!-- Subtle grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#21262d" stroke-width="0.5"/>
    </pattern>

    <!-- Portal ring gradient -->
    <linearGradient id="portalRing" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed" />
      <stop offset="25%" style="stop-color:#4285F4" />
      <stop offset="50%" style="stop-color:#34A853" />
      <stop offset="75%" style="stop-color:#FBBC05" />
      <stop offset="100%" style="stop-color:#EA4335" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bgGrad)" rx="8"/>

  <!-- Grid overlay -->
  <rect width="1200" height="400" fill="url(#grid)" opacity="0.4" rx="8"/>

  <!-- Ambient glow spots -->
  <circle cx="600" cy="200" r="250" fill="url(#portalGlow)" opacity="0.5"/>
  <circle cx="200" cy="300" r="120" fill="#4285F4" opacity="0.03"/>
  <circle cx="1000" cy="100" r="120" fill="#EA4335" opacity="0.03"/>

  <!-- === LEFT SIDE: AI Robot/Agent === -->
  <g transform="translate(140, 120)">
    <!-- Robot body -->
    <rect x="0" y="40" width="80" height="90" rx="12" fill="#21262d" stroke="#7c3aed" stroke-width="2" filter="url(#glow)"/>

    <!-- Robot head -->
    <rect x="8" y="0" width="64" height="50" rx="10" fill="#21262d" stroke="#7c3aed" stroke-width="2" filter="url(#glow)"/>

    <!-- Robot eyes -->
    <circle cx="28" cy="22" r="7" fill="#7c3aed" opacity="0.9" filter="url(#glow)"/>
    <circle cx="52" cy="22" r="7" fill="#7c3aed" opacity="0.9" filter="url(#glow)"/>
    <circle cx="28" cy="22" r="3" fill="#c4b5fd"/>
    <circle cx="52" cy="22" r="3" fill="#c4b5fd"/>

    <!-- Robot antenna -->
    <line x1="40" y1="0" x2="40" y2="-12" stroke="#7c3aed" stroke-width="2"/>
    <circle cx="40" cy="-14" r="4" fill="#7c3aed" filter="url(#glow)"/>

    <!-- Robot chest indicator -->
    <rect x="26" y="58" width="28" height="6" rx="3" fill="#7c3aed" opacity="0.6"/>
    <rect x="20" y="70" width="40" height="4" rx="2" fill="#7c3aed" opacity="0.3"/>
    <rect x="24" y="80" width="32" height="4" rx="2" fill="#7c3aed" opacity="0.2"/>

    <!-- Robot arm reaching right toward portal -->
    <line x1="80" y1="65" x2="145" y2="45" stroke="#7c3aed" stroke-width="3" stroke-linecap="round" filter="url(#glow)"/>
    <circle cx="145" cy="45" r="6" fill="#7c3aed" filter="url(#glow)"/>

    <!-- Label under robot -->
    <text x="40" y="155" text-anchor="middle" font-family="'SF Pro Display', 'Segoe UI', system-ui, -apple-system, sans-serif" font-size="11" fill="#8b949e" letter-spacing="2">AI AGENT</text>
  </g>

  <!-- === CENTER: MCP Portal === -->
  <g transform="translate(380, 200)">
    <!-- Outer glow ring -->
    <ellipse cx="0" cy="0" rx="90" ry="120" fill="none" stroke="url(#portalRing)" stroke-width="3" opacity="0.3" filter="url(#softGlow)"/>

    <!-- Middle ring -->
    <ellipse cx="0" cy="0" rx="70" ry="95" fill="none" stroke="url(#portalRing)" stroke-width="2" opacity="0.5" filter="url(#glow)"/>

    <!-- Inner ring -->
    <ellipse cx="0" cy="0" rx="50" ry="70" fill="none" stroke="url(#portalRing)" stroke-width="2.5" opacity="0.7" filter="url(#glow)"/>

    <!-- Portal interior -->
    <ellipse cx="0" cy="0" rx="45" ry="63" fill="#7c3aed" opacity="0.08"/>

    <!-- MCP text inside portal -->
    <text x="0" y="-5" text-anchor="middle" font-family="'SF Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="16" fill="#c4b5fd" font-weight="bold" letter-spacing="4" filter="url(#glow)">MCP</text>
    <text x="0" y="14" text-anchor="middle" font-family="'SF Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="9" fill="#8b949e" letter-spacing="2">PROTOCOL</text>

    <!-- Energy particles flowing through portal -->
    <circle cx="-30" cy="-40" r="2" fill="#4285F4" opacity="0.8" filter="url(#glow)"/>
    <circle cx="20" cy="-55" r="1.5" fill="#EA4335" opacity="0.8" filter="url(#glow)"/>
    <circle cx="-15" cy="50" r="2" fill="#34A853" opacity="0.8" filter="url(#glow)"/>
    <circle cx="25" cy="35" r="1.5" fill="#FBBC05" opacity="0.8" filter="url(#glow)"/>
    <circle cx="-35" cy="10" r="1" fill="#c4b5fd" opacity="0.6"/>
    <circle cx="35" cy="-20" r="1" fill="#c4b5fd" opacity="0.6"/>
  </g>

  <!-- Connection lines: Robot arm to Portal -->
  <line x1="285" y1="165" x2="320" y2="180" stroke="#7c3aed" stroke-width="1.5" opacity="0.4" stroke-dasharray="4,4"/>
  <line x1="285" y1="165" x2="325" y2="165" stroke="#7c3aed" stroke-width="1.5" opacity="0.4" stroke-dasharray="4,4"/>

  <!-- Connection lines: Portal to Icons -->
  <line x1="460" y1="140" x2="520" y2="90" stroke="#4285F4" stroke-width="1" opacity="0.3" stroke-dasharray="4,4"/>
  <line x1="465" y1="180" x2="520" y2="170" stroke="#EA4335" stroke-width="1" opacity="0.3" stroke-dasharray="4,4"/>
  <line x1="465" y1="220" x2="520" y2="250" stroke="#FBBC05" stroke-width="1" opacity="0.3" stroke-dasharray="4,4"/>
  <line x1="460" y1="260" x2="520" y2="320" stroke="#34A853" stroke-width="1" opacity="0.3" stroke-dasharray="4,4"/>

  <!-- === RIGHT SIDE: Google Workspace Icons === -->

  <!-- Drive (Folder) - Blue -->
  <g transform="translate(530, 60)" filter="url(#iconShadow)">
    <rect width="52" height="40" rx="4" fill="#1a1f2b" stroke="#4285F4" stroke-width="1.5"/>
    <rect x="0" y="0" width="24" height="8" rx="3" fill="#4285F4" opacity="0.8"/>
    <!-- Folder icon -->
    <path d="M 14 16 L 14 12 L 22 12 L 24 14 L 38 14 L 38 30 L 14 30 Z" fill="none" stroke="#4285F4" stroke-width="1.5" stroke-linejoin="round"/>
    <text x="26" y="48" text-anchor="middle" font-family="'SF Pro Display', system-ui, sans-serif" font-size="8" fill="#4285F4" opacity="0.8">Drive</text>
  </g>

  <!-- Gmail (Envelope) - Red -->
  <g transform="translate(600, 100)" filter="url(#iconShadow)">
    <rect width="52" height="40" rx="4" fill="#1a1f2b" stroke="#EA4335" stroke-width="1.5"/>
    <!-- Envelope icon -->
    <rect x="12" y="12" width="28" height="20" rx="2" fill="none" stroke="#EA4335" stroke-width="1.5"/>
    <polyline points="12,14 26,24 40,14" fill="none" stroke="#EA4335" stroke-width="1.5" stroke-linejoin="round"/>
    <text x="26" y="48" text-anchor="middle" font-family="'SF Pro Display', system-ui, sans-serif" font-size="8" fill="#EA4335" opacity="0.8">Gmail</text>
  </g>

  <!-- Sheets (Spreadsheet) - Green -->
  <g transform="translate(530, 150)" filter="url(#iconShadow)">
    <rect width="52" height="40" rx="4" fill="#1a1f2b" stroke="#34A853" stroke-width="1.5"/>
    <!-- Spreadsheet grid -->
    <rect x="14" y="10" width="24" height="22" rx="2" fill="none" stroke="#34A853" stroke-width="1.2"/>
    <line x1="14" y1="17" x2="38" y2="17" stroke="#34A853" stroke-width="0.8"/>
    <line x1="14" y1="24" x2="38" y2="24" stroke="#34A853" stroke-width="0.8"/>
    <line x1="24" y1="10" x2="24" y2="32" stroke="#34A853" stroke-width="0.8"/>
    <text x="26" y="48" text-anchor="middle" font-family="'SF Pro Display', system-ui, sans-serif" font-size="8" fill="#34A853" opacity="0.8">Sheets</text>
  </g>

  <!-- Calendar - Yellow -->
  <g transform="translate(600, 190)" filter="url(#iconShadow)">
    <rect width="52" height="40" rx="4" fill="#1a1f2b" stroke="#FBBC05" stroke-width="1.5"/>
    <!-- Calendar icon -->
    <rect x="14" y="14" width="24" height="20" rx="2" fill="none" stroke="#FBBC05" stroke-width="1.2"/>
    <line x1="14" y1="20" x2="38" y2="20" stroke="#FBBC05" stroke-width="1"/>
    <line x1="20" y1="11" x2="20" y2="16" stroke="#FBBC05" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="32" y1="11" x2="32" y2="16" stroke="#FBBC05" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Calendar day number -->
    <text x="26" y="31" text-anchor="middle" font-family="'SF Pro Display', system-ui, sans-serif" font-size="9" fill="#FBBC05" font-weight="bold">17</text>
    <text x="26" y="48" text-anchor="middle" font-family="'SF Pro Display', system-ui, sans-serif" font-size="8" fill="#FBBC05" opacity="0.8">Calendar</text>
  </g>

  <!-- Docs (Document) - Blue -->
  <g transform="translate(530, 240)" filter="url(#iconShadow)">
    <rect width="52" height="40" rx="4" fill="#1a1f2b" stroke="#4285F4" stroke-width="1.5"/>
    <!-- Document icon -->
    <rect x="16" y="10" width="20" height="24" rx="2" fill="none" stroke="#4285F4" stroke-width="1.2"/>
    <line x1="20" y1="17" x2="32" y2="17" stroke="#4285F4" stroke-width="1" opacity="0.7"/>
    <line x1="20" y1="21" x2="32" y2="21" stroke="#4285F4" stroke-width="1" opacity="0.7"/>
    <line x1="20" y1="25" x2="28" y2="25" stroke="#4285F4" stroke-width="1" opacity="0.7"/>
    <text x="26" y="48" text-anchor="middle" font-family="'SF Pro Display', system-ui, sans-serif" font-size="8" fill="#4285F4" opacity="0.8">Docs</text>
  </g>

  <!-- Forms - Purple -->
  <g transform="translate(600, 280)" filter="url(#iconShadow)">
    <rect width="52" height="40" rx="4" fill="#1a1f2b" stroke="#7c3aed" stroke-width="1.5"/>
    <!-- Form icon -->
    <rect x="16" y="10" width="20" height="24" rx="2" fill="none" stroke="#7c3aed" stroke-width="1.2"/>
    <circle cx="22" cy="17" r="2" fill="none" stroke="#7c3aed" stroke-width="1"/>
    <line x1="27" y1="17" x2="33" y2="17" stroke="#7c3aed" stroke-width="1" opacity="0.7"/>
    <circle cx="22" cy="23" r="2" fill="none" stroke="#7c3aed" stroke-width="1"/>
    <line x1="27" y1="23" x2="33" y2="23" stroke="#7c3aed" stroke-width="1" opacity="0.7"/>
    <circle cx="22" cy="29" r="2" fill="none" stroke="#7c3aed" stroke-width="1"/>
    <line x1="27" y1="29" x2="33" y2="29" stroke="#7c3aed" stroke-width="1" opacity="0.7"/>
    <text x="26" y="48" text-anchor="middle" font-family="'SF Pro Display', system-ui, sans-serif" font-size="8" fill="#7c3aed" opacity="0.8">Forms</text>
  </g>

  <!-- === TEXT: Title and Subtitle === -->

  <!-- Main title -->
  <text x="900" y="150" text-anchor="middle" font-family="'SF Pro Display', 'Segoe UI', system-ui, -apple-system, sans-serif" font-size="36" fill="#e6edf3" font-weight="700" letter-spacing="-0.5">
    Google Drive
  </text>
  <text x="900" y="192" text-anchor="middle" font-family="'SF Pro Display', 'Segoe UI', system-ui, -apple-system, sans-serif" font-size="36" fill="#e6edf3" font-weight="700" letter-spacing="-0.5">
    MCP Server
  </text>

  <!-- Subtitle -->
  <text x="900" y="228" text-anchor="middle" font-family="'SF Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="13" fill="#7c3aed" letter-spacing="1" filter="url(#glow)">
    6 Tools  |  47 Operations
  </text>
  <text x="900" y="252" text-anchor="middle" font-family="'SF Pro Display', 'Segoe UI', system-ui, -apple-system, sans-serif" font-size="13" fill="#8b949e" letter-spacing="1">
    Complete Google Workspace Access
  </text>

  <!-- Version badge -->
  <g transform="translate(845, 268)">
    <rect width="110" height="24" rx="12" fill="#21262d" stroke="#30363d" stroke-width="1"/>
    <text x="55" y="16" text-anchor="middle" font-family="'SF Mono', 'Fira Code', monospace" font-size="10" fill="#7c3aed">v3.3.0  |  MCP</text>
  </g>

  <!-- Decorative bottom border -->
  <rect x="0" y="394" width="300" height="6" rx="0" fill="#4285F4" opacity="0.6"/>
  <rect x="300" y="394" width="300" height="6" rx="0" fill="#EA4335" opacity="0.6"/>
  <rect x="600" y="394" width="300" height="6" rx="0" fill="#FBBC05" opacity="0.6"/>
  <rect x="900" y="394" width="300" height="6" rx="0" fill="#34A853" opacity="0.6"/>

  <!-- Decorative top border accent -->
  <rect x="0" y="0" width="1200" height="2" rx="0" fill="url(#portalRing)" opacity="0.4"/>
</svg>