name: CI

# Trigger the workflow on push to any branch and pull requests to main
on:
  push:
    branches: [ "*" ]
  pull_request:
    branches: [ "main" ]
  # Allow manual trigger for testing
  workflow_dispatch:

# Set default permissions for security
permissions:
  contents: read
  pull-requests: write
  checks: write
  actions: read
  security-events: write

env:
  NODE_VERSION: '22'

jobs:
  # Job 1: Code Quality and Testing
  test:
    name: Test and Code Quality
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [22]
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for better analysis
      
      - name: Get npm cache directory
        id: npm-cache-dir
        shell: bash
        run: echo "dir=$(npm config get cache)" >> $GITHUB_OUTPUT
      
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          
      - name: Cache npm dependencies
        uses: actions/cache@v4
        id: npm-cache
        with:
          path: ${{ steps.npm-cache-dir.outputs.dir }}
          key: ${{ runner.os }}-node-${{ matrix.node-version }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-${{ matrix.node-version }}-
            ${{ runner.os }}-node-
      
      - name: Install dependencies
        run: |
          npm ci --prefer-offline --no-audit
          # Verify package integrity
          npm audit --audit-level=high || echo "Audit completed with warnings"
      
      - name: Type checking
        run: npm run type-check
        
      - name: Lint code
        run: npm run lint
      
      - name: Build TypeScript
        run: npm run build

      - name: Build Worker TypeScript
        run: npm run build:worker
        
      - name: Cache build artifacts
        uses: actions/cache@v4
        with:
          path: |
            dist/
            coverage/
          key: ${{ runner.os }}-build-${{ matrix.node-version }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-build-${{ matrix.node-version }}-
        
      - name: Run unit tests
        run: npm run test:coverage
        env:
          NODE_ENV: test
          
      - name: Run integration tests
        run: npm run test:integration
        env:
          NODE_ENV: test
          
      - name: Upload coverage reports
        if: matrix.node-version == 22  # Only upload once
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage/lcov.info
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
          
      - name: Store build artifacts
        if: matrix.node-version == 22  # Only store once
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            dist/
            package*.json
          retention-days: 1

  # Job 2: Security Analysis
  security:
    name: Security Analysis
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit
        
      - name: Run npm audit
        run: |
          npm audit --audit-level=moderate --omit=dev
          
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript
          queries: security-extended,security-and-quality
          
      - name: Build for CodeQL
        run: npm run build:worker
        
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript"

  # Job 3: Performance and Load Testing
  performance:
    name: Performance Testing
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit
        
      - name: Build application
        run: npm run build:worker
        
      - name: Run performance tests
        run: |
          # Run performance-related tests if they exist
          if npm run test:performance 2>/dev/null; then
            npm run test:performance
          else
            echo "No performance tests found, skipping..."
          fi
        env:
          NODE_ENV: test
          
      - name: Benchmark key operations
        run: |
          # Run benchmark tests if they exist
          if ls src/__tests__/**/*.benchmark.test.ts 1> /dev/null 2>&1; then
            npx jest --testMatch="**/*.benchmark.test.ts" --verbose
          else
            echo "No benchmark tests found, skipping..."
          fi
  # Job 4: E2E Testing (only on main branch and PRs)
  e2e:
    name: End-to-End Testing
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit
        
      - name: Build application
        run: npm run build:worker
        
      - name: Run E2E tests
        run: |
          if npm run test:e2e 2>/dev/null; then
            npm run test:e2e
          else
            echo "No E2E tests found, running CLI command tests..."
            if ls src/__tests__/e2e/**/*.test.ts 1> /dev/null 2>&1; then
              npx jest --testMatch="**/e2e/**/*.test.ts" --verbose
            fi
          fi
        env:
          NODE_ENV: test

  # Job 5: Documentation and Schema Validation
  validate:
    name: Validate Documentation and Schema
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit
        
      - name: Build application
        run: npm run build:worker
        
      - name: Validate MCP schema compliance
        run: npm test -- --runTestsByPath src/__tests__/server/factory.test.ts src/__tests__/worker/worker-auth.test.ts
          
      - name: Check for TODO/FIXME comments
        run: |
          echo "Scanning for TODO/FIXME comments..."
          if grep -r "TODO\|FIXME\|XXX" src/ dist/ --include="*.ts" --include="*.js" | grep -v node_modules; then
            echo "Warning: Found TODO/FIXME comments. Consider addressing them before release."
            exit 0  # Don't fail the build, just warn
          else
            echo "No TODO/FIXME comments found."
          fi
          
      - name: Validate package.json
        run: |
          echo "Package validation passed:"
          echo "- Name: $(jq -r '.name' package.json)"
          echo "- Version: $(jq -r '.version' package.json)"
          echo "- Worker entry: $(jq -r '.files[]' package.json | grep -x worker.ts)"
