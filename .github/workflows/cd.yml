name: CD (Cloudflare Workers)

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".github/ISSUE_TEMPLATE/**"
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production
      skip-tests:
        description: "Skip test suite"
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  deployments: write
  checks: read
  id-token: write

env:
  NODE_VERSION: "22"

jobs:
  pre-deploy:
    name: Pre-deployment Validation
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch' || !inputs.skip-tests

    outputs:
      version: ${{ steps.version.outputs.version }}
      environment: ${{ steps.env.outputs.environment }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Run critical checks
        run: |
          npm run type-check
          npm run test -- --passWithNoTests
          npm run build:worker

      - name: Determine version
        id: version
        run: |
          VERSION=$(jq -r '.version' package.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Current version: $VERSION"

      - name: Determine target environment
        id: env
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            ENV="${{ inputs.environment }}"
          elif [[ "${{ github.event_name }}" == "release" ]]; then
            ENV="production"
          else
            ENV="staging"
          fi
          echo "environment=$ENV" >> "$GITHUB_OUTPUT"
          echo "Target environment: $ENV"

  deploy-worker:
    name: Deploy Worker
    runs-on: ubuntu-latest
    needs: pre-deploy
    if: always() && (needs.pre-deploy.result == 'success' || needs.pre-deploy.result == 'skipped')
    environment:
      name: ${{ needs.pre-deploy.outputs.environment || inputs.environment || 'staging' }}
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Build Worker
        run: npm run build:worker

      - name: Deploy to Cloudflare Workers
        if: env.CLOUDFLARE_API_TOKEN != ''
        run: npx wrangler deploy

      - name: Deployment skipped
        if: env.CLOUDFLARE_API_TOKEN == ''
        run: |
          echo "Cloudflare deployment skipped because CLOUDFLARE_API_TOKEN is not configured."
          echo "Worker build completed for version ${{ needs.pre-deploy.outputs.version }}."
